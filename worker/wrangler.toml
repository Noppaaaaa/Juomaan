name = "juomaan-aanet"
main = "src/index.js"
compatibility_date = "2024-09-01"

# D1-tietokanta. Luo se komennolla `wrangler d1 create juomaan_aanet`
# ja liitä saatu database_id alle.
[[d1_databases]]
binding = "DB"
database_name = "juomaan_aanet"
database_id = "REPLACE_AFTER_CREATE"

# --- Vaihtoehto: oma reitti samalle domainille (ei CORSia) ---
# Jos haluat että API on osoitteessa https://juomaan.fi/api/votes
# (GitHub Pages tarjoilee muun sivun, worker vain /api/*-polun),
# poista kommentit alta. Vaatii että juomaan.fi on Cloudflaren
# proxyssa (oranssi pilvi) ja zone on samalla tilillä.
# [[routes]]
# pattern = "juomaan.fi/api/*"
# zone_name = "juomaan.fi"
