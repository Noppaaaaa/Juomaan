name = "juomaan-aanet"
main = "src/index.js"
compatibility_date = "2024-09-01"

# D1-tietokanta. Luo se komennolla `wrangler d1 create juomaan_aanet`
# ja liitä saatu database_id alle.
[[d1_databases]]
binding = "DB"
database_name = "juomaan_aanet"
database_id = "2bfaca03-bad9-4f32-a7fb-7d876e104c41"

# API tarjoillaan samalta domainilta: https://juomaan.fi/api/votes
# (GitHub Pages tarjoilee muun sivun, worker sieppaa vain /api/*-polun).
# Vaatii että juomaan.fi on Cloudflaren proxyssa (oranssi pilvi) ja zone tällä tilillä.
[[routes]]
pattern = "juomaan.fi/api/*"
zone_name = "juomaan.fi"
