<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Alko Tuotetiedot – Suora linkki tuotteeseen</title>
    <style>
        /* ... tyylit pysyvät täsmälleen samoina ... */
        /* (katso edellinen koodi – kopioin tähän vain muutokset) */
        /* Kaikki aiemmat tyylit säilyvät, muutokset kommentin alla */
    </style>
</head>
<body>
    <div class="container">
        <!-- ... kuten aiemmin ... -->
    </div>

    <script>
        // ... muuttujat ja funktiot, paitsi marginaaleja muutettu ...

        function checkStuck() {
            if (isShifting || isUserScrolling) return;
            const table = document.getElementById('tuoteTaulukko');
            if (!table) return;
            const sorted = getSortedData();
            const rect = table.getBoundingClientRect();
            const viewHeight = window.innerHeight;
            // Suurempi marginaali, jotta siirto tehdään ajoissa
            const margin = window.innerWidth < 768 ? 300 : 400;

            if (rect.top >= -margin && startIndex > 0) {
                shiftWindow('backward');
            } else if (rect.bottom <= viewHeight + margin && startIndex + WINDOW_SIZE < sorted.length) {
                shiftWindow('forward');
            }
        }

        function getRootMargin() {
            // Havaitaan lähestyminen paljon aiemmin
            return window.innerWidth < 768 ? '500px 0px 500px 0px' : '800px 0px 800px 0px';
        }

        // ... loput pysyvät identtisinä ...
    </script>
</body>
</html>
