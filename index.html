<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alko Tuotetiedot – Suora linkki tuotteeseen</title>
    <style>
        /* ... sama CSS kuin edellisessä viestissä ... */
        /* (Pidetään CSS tässä lyhyyden vuoksi kommenttina, mutta kopioi se kokonaisuudessaan) */
    </style>
</head>
<body>
    <!-- ... sama HTML-rakenne ... -->

    <script>
        // ... (teema-funktiot, muuttujat, lajittelu, escapeHtml jne. pysyvät ennallaan)

        let tuoteData = [];
        let startIndex = 0;
        const WINDOW_SIZE = 50;
        const SHIFT_AMOUNT = 30;
        let currentSort = 'annos';
        let isShifting = false;

        // ... muut muuttujat

        function getSortedData() {
            let lajiteltu = [...tuoteData];
            if (currentSort === 'hinta') {
                lajiteltu.sort((a, b) => a.hinta_eur - b.hinta_eur);
            } else {
                lajiteltu.sort((a, b) => laskeAnnosHinta(a) - laskeAnnosHinta(b));
            }
            return lajiteltu;
        }

        function renderWindow() {
            // ... (sama renderöintilogiikka kuin ennenkin)
        }

        function shiftWindow(direction) {
            if (isShifting) return false;
            const sorted = getSortedData();
            if (direction === 'forward' && startIndex + WINDOW_SIZE >= sorted.length) return false;
            if (direction === 'backward' && startIndex === 0) return false;

            let anchorIndex;
            if (direction === 'forward') {
                anchorIndex = startIndex + SHIFT_AMOUNT;
            } else {
                anchorIndex = startIndex;
            }

            const anchorRow = document.querySelector(`tr[data-index="${anchorIndex}"]`);
            if (!anchorRow) return false;
            const oldAnchorTop = anchorRow.getBoundingClientRect().top;

            isShifting = true; // esto päälle

            if (direction === 'forward') {
                startIndex += SHIFT_AMOUNT;
            } else {
                startIndex = Math.max(0, startIndex - SHIFT_AMOUNT);
            }

            renderWindow();

            requestAnimationFrame(() => {
                const newAnchorRow = document.querySelector(`tr[data-index="${anchorIndex}"]`);
                if (newAnchorRow) {
                    const newAnchorTop = newAnchorRow.getBoundingClientRect().top;
                    const diff = newAnchorTop - oldAnchorTop;
                    window.scrollBy({ top: diff, behavior: 'instant' });
                }
                // Vapautetaan esto lähes välittömästi, jotta seuraava siirto voi tapahtua heti
                isShifting = false;
            });
            return true;
        }

        // IntersectionObserver isolla marginilla, jotta nopea rullaus ehtii mukaan
        const observerOptions = {
            root: null,
            rootMargin: '400px 0px 400px 0px', // 400px riittää ennakoimaan
            threshold: 0
        };

        const topSentinel = document.getElementById('topSentinel');
        const bottomSentinel = document.getElementById('bottomSentinel');

        const topObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && !isShifting && startIndex > 0) {
                    shiftWindow('backward');
                }
            });
        }, observerOptions);

        const bottomObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && !isShifting) {
                    shiftWindow('forward');
                }
            });
        }, observerOptions);

        topObserver.observe(topSentinel);
        bottomObserver.observe(bottomSentinel);

        // Varajärjestelmä scrollilla, tarkistus 50ms välein
        let lastScrollCheck = 0;
        window.addEventListener('scroll', () => {
            const now = Date.now();
            if (now - lastScrollCheck < 50) return;
            lastScrollCheck = now;
            if (isShifting) return;

            const table = document.getElementById('tuoteTaulukko');
            if (!table) return;
            const rect = table.getBoundingClientRect();
            const viewHeight = window.innerHeight;
            const MARGIN = 300; // hieman pienempi kuin observerin marginaali, jotta ei tule päällekkäisyyttä

            if (rect.top > -MARGIN && startIndex > 0) {
                shiftWindow('backward');
            } else if (rect.bottom < viewHeight + MARGIN && startIndex + WINDOW_SIZE < getSortedData().length) {
                shiftWindow('forward');
            }
        }, { passive: true });

        // Lajittelu
        function jarjesta(kriteeri) {
            isShifting = false; // nollaa esto
            currentSort = kriteeri;
            startIndex = 0;
            renderWindow();
            asetaAktiivinenNappi(kriteeri);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Alkulataus
        fetch('alko_tuotteet.json')
            .then(/* ... sama kuin ennen ... */);
    </script>
</body>
</html>
