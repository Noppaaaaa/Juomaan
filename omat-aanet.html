<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Omat annetut äänet – juomaan.fi</title>
    <meta name="description" content="Näe mihin juomiin olet antanut äänesi ja peru ääniä halutessasi.">
    <meta name="robots" content="noindex,follow">
    <meta name="theme-color" content="#8B0000" id="metaThemeColor">
    <style>
        *,*::before,*::after{box-sizing:border-box}html{-webkit-text-size-adjust:100%}
        :root{--bg-body:#f0f4f8;--bg-container:#ffffff;--text-main:#1a202c;--text-heading:#2d3748;--text-muted:#4a5568;--info-bg:#ebf8ff;--info-text:#2b6cb0;--info-border:#3182ce;--btn-bg:#2b6cb0;--btn-hover:#2c5282;--btn-active-bg:#1e4a6b;--table-border:#e2e8f0;--row-border:#edf2f7;--kytkin-bg:#cbd5e0;--link-color:#2b6cb0;--kortti-bg:#f8fafc}
        body.dark-mode{--bg-body:#1a1e26;--bg-container:#21252f;--text-main:#e2e8f0;--text-heading:#f8fafc;--text-muted:#94a3b8;--info-bg:#1a1e26;--info-text:#38bdf8;--info-border:#0ea5e9;--btn-bg:#0ea5e9;--btn-hover:#0284c7;--btn-active-bg:#0369a1;--table-border:#2d333b;--row-border:#2d333b;--kytkin-bg:#3a4049;--link-color:#7dd3fc;--kortti-bg:#1a1e26}
        body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;margin:0;padding:40px 20px;background:var(--bg-body);color:var(--text-main);min-height:100vh;transition:background .3s,color .3s}
        .container{max-width:800px;margin:0 auto;background:var(--bg-container);border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,.05);padding:30px;transition:background .3s}
        h1{font-size:34px;font-weight:700;color:#8B0000;margin:0}
        .alaotsikko{font-size:14px;color:var(--text-muted);margin:4px 0 0}
        /* Yläpalkki */
        .ylapalkki{display:flex;justify-content:space-between;align-items:center;gap:15px;flex-wrap:wrap;padding-bottom:18px;margin-bottom:18px;border-bottom:2px solid var(--table-border)}
        .ylapalkki-napit{display:flex;gap:10px;flex-wrap:wrap}
        .yp-nappi{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background-color:var(--btn-bg);color:#fff;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;transition:all .2s;box-shadow:0 4px 6px rgba(0,0,0,.1);white-space:nowrap;cursor:pointer}
        .yp-nappi:hover{background-color:var(--btn-hover);transform:translateY(-2px)}
        .yp-nappi.aktiivinen{background-color:var(--btn-active-bg);box-shadow:0 0 0 2px rgba(255,255,255,.3)}
        @media(max-width:480px){.yp-nappi{padding:8px 12px;font-size:13px}}
        /* Teemakytkin */
        .kytkin-wrapper{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;color:var(--text-muted)}
        .teema-kytkin{position:relative;display:inline-block;width:56px;height:28px}
        .teema-kytkin input{opacity:0;width:0;height:0}
        .liuku{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:var(--kytkin-bg);transition:.3s;border-radius:34px}
        .liuku:before{position:absolute;content:"☀️";font-size:16px;display:flex;align-items:center;justify-content:center;height:22px;width:22px;left:3px;bottom:3px;background-color:white;transition:.3s;border-radius:50%;color:#f59e0b;box-shadow:0 1px 3px rgba(0,0,0,.2)}
        input:checked+.liuku:before{content:"🌙";color:#3b82f6;transform:translateX(28px)}
        input:checked+.liuku{background-color:var(--btn-bg)}
        /* Sisältö */
        .info{display:block;padding:12px 16px;background-color:var(--info-bg);color:var(--info-text);border-left:4px solid var(--info-border);border-radius:6px;font-weight:500;font-size:15px;margin:18px 0 24px}
        .aani-lista{display:flex;flex-direction:column;gap:14px}
        .aani-kortti{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--kortti-bg);border:1px solid var(--table-border);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
        .aani-kortti img{height:64px;max-width:64px;object-fit:contain;border-radius:6px;flex-shrink:0;background:#fff}
        .aani-kortti .tiedot{flex:1;min-width:0}
        .aani-kortti .nimi{font-weight:700;font-size:16px;color:var(--text-heading);margin:0 0 4px;word-break:break-word}
        .aani-kortti .nimi a{color:var(--link-color);text-decoration:none}
        .aani-kortti .nimi a:hover{text-decoration:underline}
        .aani-kortti .meta{font-size:13px;color:var(--text-muted)}
        .peru-nappi{padding:8px 14px;font-size:13px;font-weight:600;border:1px solid #e03131;border-radius:8px;background:transparent;color:#e03131;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap;flex-shrink:0;font-family:inherit}
        .peru-nappi:hover:not(:disabled){background:#e03131;color:#fff}
        .peru-nappi:disabled{opacity:.5;cursor:default}
        body.dark-mode .peru-nappi{border-color:#ff6b6b;color:#ff6b6b}
        body.dark-mode .peru-nappi:hover:not(:disabled){background:#ff6b6b;color:#1a1e26}
        .tyhja{padding:30px;text-align:center;color:var(--text-muted);font-size:16px;line-height:1.6}
        .tyhja a{color:var(--link-color);font-weight:600}
        footer{margin-top:36px;padding-top:18px;border-top:1px solid var(--kytkin-bg);text-align:center;font-size:13px;color:var(--text-muted)}
        footer a{color:var(--link-color)}
        @media(max-width:480px){body{padding:15px 5px}.container{padding:18px}h1{font-size:26px}.aani-kortti{flex-wrap:wrap}.teema-kytkin{width:48px;height:24px}.liuku:before{height:18px;width:18px;font-size:12px}input:checked+.liuku:before{transform:translateX(24px)}}
    </style>
</head>
<body>
    <main class="container" role="main">
        <nav class="ylapalkki" aria-label="Sivunavigointi">
            <div class="ylapalkki-napit">
                <a href="index.html" class="yp-nappi" title="Etusivu – hintavertailu">Etusivulle</a>
                <a href="omat-aanet.html" class="yp-nappi aktiivinen" aria-current="page" title="Omat antamasi äänet">Omat annetut äänet</a>
                <a href="tietoa.html" class="yp-nappi" title="Tietoa sivustosta ja tekijöistä">Tietoja</a>
            </div>
            <div class="kytkin-wrapper">
                <span id="teemaTeksti" aria-live="polite">Tumma teema</span>
                <label class="teema-kytkin" aria-label="Vaihda tumman ja vaalean teeman välillä">
                    <input type="checkbox" id="teemaToggle" onchange="vaihdaTeema()">
                    <span class="liuku"></span>
                </label>
            </div>
        </nav>

        <header>
            <h1>Omat annetut äänet</h1>
            <p class="alaotsikko">Mihin juomiin olet antanut äänesi parhaasta dokabiliteetistä (maku/alkoholi-suhde)</p>
        </header>

        <div id="info" class="info" role="status" aria-live="polite">Ladataan ääniäsi…</div>
        <div id="lista" class="aani-lista"></div>

        <footer>
            <p>juomaan.fi – <a href="index.html">Takaisin hintavertailuun</a></p>
        </footer>
    </main>

    <script>
    (function(){"use strict";
        /* ---- Teema ---- */
        const teemaToggle=document.getElementById("teemaToggle"),teemaTeksti=document.getElementById("teemaTeksti"),metaThemeColor=document.getElementById("metaThemeColor");
        function paivitaTeemaTeksti(){if(document.body.classList.contains("dark-mode")){teemaTeksti.textContent="Tumma teema";metaThemeColor?.setAttribute("content","#1a1e26")}else{teemaTeksti.textContent="Vaalea teema";metaThemeColor?.setAttribute("content","#8B0000")}}
        if(localStorage.getItem("tummaTeema")==="kylla"){document.body.classList.add("dark-mode");teemaToggle.checked=true}
        paivitaTeemaTeksti();
        window.vaihdaTeema=function(){document.body.classList.toggle("dark-mode");localStorage.setItem("tummaTeema",document.body.classList.contains("dark-mode")?"kylla":"ei");paivitaTeemaTeksti()};

        /* ---- Äänet ---- */
        const AANI_API=""; /* sama domain -> /api/votes (reititetään Cloudflare-workeriin) */
        const AANI_URL=(AANI_API?AANI_API.replace(/\/$/,''):'')+'/api/votes';
        const infoDiv=document.getElementById('info'),lista=document.getElementById('lista');
        const clientId=localStorage.getItem('aaniClientId')||'';
        let AANI_MAX=3,tuoteKartta={};

        function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m])}
        function tuoteAvain(t){return (t.nimi||'').trim()+'||'+t.alkoholi_prosentti+'||'+t.hinta_eur}

        function naytaTyhja(){lista.innerHTML='';infoDiv.style.display='none';lista.innerHTML='<div class="tyhja">Et ole vielä antanut yhtään ääntä.<br>Siirry <a href="index.html">etusivulle</a> ja äänestä juomia 👍</div>'}

        function renderoi(omat){
            if(!omat.length){naytaTyhja();return}
            infoDiv.innerHTML=`Olet antanut <strong>${omat.length}/${AANI_MAX}</strong> ääntä. Voit perua äänen alta.`;
            lista.innerHTML='';
            for(const avain of omat){
                const t=tuoteKartta[avain];
                const nimi=t?t.nimi:avain.split('||')[0];
                const url=t&&t.linkki&&t.linkki.trim()?t.linkki:`https://www.alko.fi/fi/tuotteet?q=${encodeURIComponent(nimi)}`;
                const kuva=t&&t.kuva_url?`<img src="${escapeHtml(t.kuva_url)}" alt="" onerror="this.style.display='none'">`:'';
                const meta=t?`${Number(t.alkoholi_prosentti).toFixed(1)} % · ${Number(t.hinta_eur).toFixed(2)} €`:'';
                const kortti=document.createElement('div');
                kortti.className='aani-kortti';
                kortti.dataset.avain=avain;
                kortti.innerHTML=`${kuva}<div class="tiedot"><p class="nimi"><a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(nimi)}</a></p><div class="meta">${escapeHtml(meta)}</div></div><button type="button" class="peru-nappi">✕ Peru ääni</button>`;
                kortti.querySelector('.peru-nappi').addEventListener('click',function(){peruAani(avain,this,kortti)});
                lista.appendChild(kortti);
            }
        }

        async function peruAani(avain,btn,kortti){
            btn.disabled=true;btn.textContent='Perutaan…';
            try{
                const r=await fetch(AANI_URL,{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId,key:avain})});
                if(!r.ok)throw new Error('HTTP '+r.status);
                const d=await r.json();
                renderoi(Array.isArray(d.omat)?d.omat:[]);
            }catch(e){
                btn.disabled=false;btn.textContent='✕ Peru ääni';
                infoDiv.style.display='block';infoDiv.innerHTML='⚠️ Äänen peruminen ei juuri nyt onnistunut. Yritä uudelleen.';
            }
        }

        async function lataa(){
            if(!clientId){naytaTyhja();return}
            try{
                const [vastaus,tuotteet]=await Promise.all([
                    fetch(`${AANI_URL}?clientId=${encodeURIComponent(clientId)}`).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}),
                    fetch('alko_tuotteet.json').then(r=>r.ok?r.json():[]).catch(()=>[])
                ]);
                if(typeof vastaus.max==='number')AANI_MAX=vastaus.max;
                if(Array.isArray(tuotteet)){for(const t of tuotteet){if(!t||!t.nimi)continue;const avain=tuoteAvain({nimi:t.nimi,alkoholi_prosentti:Number(t.alkoholi_prosentti)||0,hinta_eur:Number(t.hinta_eur)||0});if(!(avain in tuoteKartta))tuoteKartta[avain]={nimi:t.nimi.trim(),alkoholi_prosentti:Number(t.alkoholi_prosentti)||0,hinta_eur:Number(t.hinta_eur)||0,linkki:t.linkki||'',kuva_url:t.kuva_url||''}}}
                infoDiv.style.display='block';
                renderoi(Array.isArray(vastaus.omat)?vastaus.omat:[]);
            }catch(e){
                infoDiv.innerHTML='❌ Ääniä ei voitu ladata juuri nyt. <a href="index.html">Takaisin etusivulle</a>.';
            }
        }
        lataa();
    })();
    </script>
</body>
</html>
